site_name: Shelf
site_url: https://tarantini-io.github.io/shelf
site_description: A modern, self-hosted book management system
repo_url: https://github.com/tarantini-io/shelf
repo_name: tarantini-io/shelf
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
    - Upgrading: getting-started/upgrading.md
  - User Guide:
    - Importing Books: user-guide/importing-books.md
    - Managing Metadata: user-guide/managing-metadata.md
    - Reading: user-guide/reading.md
    - OPDS Feed: user-guide/opds.md
    - KOReader Sync: user-guide/koreader.md
    - PWA Install: user-guide/pwa-install.md
  - Contributing:
    - Development Setup: contributing/development-setup.md
    - Code Conventions: contributing/code-conventions.md
    - Testing: contributing/testing.md
    - Releases: contributing/releases.md
