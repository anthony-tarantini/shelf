name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Backend - Spotless and Detekt
        run: ./gradlew spotlessCheck detekt

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Frontend - Install
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Frontend - Check
        working-directory: ui
        run: bun run check

  backend-test:
    needs:
      - backend-quality
      - frontend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Testcontainers database image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: database.Dockerfile
          tags: shelf-postgres:test
          load: true
          push: false

      - name: Backend - Test
        run: ./gradlew test

  frontend-test:
    needs:
      - backend-quality
      - frontend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Frontend - Install
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Frontend - Unit Tests
        working-directory: ui
        run: bun run test:unit

  e2e-test:
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        working-directory: ui
        run: bunx playwright install --with-deps chromium

      - name: Build Images & Run E2E Tests
        working-directory: ui
        env:
          SHELF_COMPOSE: "docker compose"
        run: bun run test:e2e:full

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7

  publish-images:
    needs:
      - backend-quality
      - backend-test
      - frontend-test
      - e2e-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: backend.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/shelf-backend
          - name: frontend
            dockerfile: frontend.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/shelf-frontend
          - name: database
            dockerfile: database.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/shelf-database
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:main
            ${{ matrix.image }}:sha-${{ github.sha }}
