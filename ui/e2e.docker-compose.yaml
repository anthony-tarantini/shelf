name: shelf-e2e

services:
  database:
    image: shelf-postgres:test
    build:
      context: ..
      dockerfile: database.Dockerfile
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=shelf
    volumes:
      - ../init-db.sql:/docker-entrypoint-initdb.d/01-setup-fuzzy-search.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d shelf" ]
      interval: 5s
      timeout: 5s
      retries: 5

  fixtures:
    image: nginx:alpine
    volumes:
      - ./static:/usr/share/nginx/html:ro
    ports:
      - "4174:80"

  valkey:
    image: valkey/valkey:8.0
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: backend.Dockerfile
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy
      fixtures:
        condition: service_started
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readiness >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
    environment:
      POSTGRES_URL: jdbc:postgresql://database:5432/shelf
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: e2e-test-secret
      JWT_ISSUER: Shelf
      JWT_DURATION: 30
      HARDCOVER_URL: https://api.hardcover.app/v1/graphql
      HARDCOVER_API_KEY: dummy-key
      IMPORT_SCAN_ROOTS: /import-fixtures
      STORAGE_PATH: /storage
      VALKEY_URL: redis://valkey:6379
      HOST: 0.0.0.0
      SERVER_PORT: 8080
      CORS_ALLOWED_HOSTS: localhost:5173,localhost:4173,127.0.0.1:5173,127.0.0.1:4173
      PUBLIC_ROOT_URL: http://127.0.0.1:4173
      OBSERVABILITY_ENABLED: "false"
      LIBATION_IMPORT_ENABLED: "false"
    volumes:
      - ./tests/fixtures/storage:/import-fixtures:ro
      - storage-data:/storage

volumes:
  storage-data:
