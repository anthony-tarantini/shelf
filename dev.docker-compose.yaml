name: shelf-dev

services:
  database:
    image: shelf-postgres:test
    build:
      context: .
      dockerfile: database.Dockerfile
    restart: always
    ports:
      - "5432:5432"
    container_name: shelf-db-dev
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-setup-fuzzy-search.sql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=shelf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shelf"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0
    restart: always
    ports:
      - "6379:6379"
    container_name: shelf-valkey-dev
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  lgtm:
    image: grafana/otel-lgtm:latest
    restart: always
    ports:
      - "3001:3000"
      - "4317:4317"
      - "4318:4318"