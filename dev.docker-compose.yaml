name: shelf-dev

services:
  database:
    build:
      context: .
      dockerfile: database.Dockerfile
    restart: always
    ports:
      - "5432:5432"
    container_name: shelf-db-dev
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-setup-fuzzy-search.sql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=shelf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shelf"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0
    restart: always
    ports:
      - "6379:6379"
    container_name: shelf-valkey-dev
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  lgtm:
    image: grafana/otel-lgtm:latest
    restart: always
    ports:
      - "3001:3000"
      - "4317:4317"
      - "4318:4318"

#  minuspod:
#    image: ttlequals0/minuspod:latest
#    restart: always
#    ports:
#      - "8081:8080"
#    environment:
#      ADMIN_PASSWORD: ${MINUSPOD_ADMIN_PASSWORD:-admin}
#      BASE_URL: ${MINUSPOD_BASE_URL:-http://localhost:8081}
#    volumes:
#      - ./data/minuspod:/app/data

  libation:
    build:
      context: ./libation
      dockerfile: Dockerfile
    image: ${LIBATION_IMAGE:-tarantini-io/shelf/libation:local}
    restart: always
    privileged: true   # Required for D-Bus and X-Server to initialize properly
    shm_size: "1gb"    # CRITICAL: Web browsers/X-servers will black out without enough shared memory
    ports:
      - "5299:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    environment:
      - PUID=${LIBATION_PUID:-1000}
      - PGID=${LIBATION_PGID:-1000}
      - TZ=${LIBATION_TZ:-America/Chicago}
    volumes:
      - ./data/libation:/config
      - ./data/libation-export:/exports
